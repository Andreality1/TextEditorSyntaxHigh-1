
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fixed Scroll Syntax Editor</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet" />
    <style>
        :root {
            --bg-dark: #1e1e1e;
            --header-bg: #252526;
            --border-color: #3c3c3c;
            --gutter-bg: #1e1e1e;
            --gutter-text: #858585;
            --accent: #007acc;
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            background-color: var(--bg-dark);
            color: #fff;
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
        }

        header {
            background-color: var(--header-bg);
            padding: 10px 20px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .btn-download {
            background-color: var(--accent);
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }

        .main-container {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        .pane {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .pane-left { border-right: 1px solid var(--border-color); }

        .pane-title {
            background: #2d2d2d;
            padding: 5px 15px;
            font-size: 11px;
            text-transform: uppercase;
            color: #888;
        }

        /* Essential Scroll Container */
        .scroll-wrapper {
            flex: 1;
            display: flex;
            overflow: auto; /* The actual scrollable element */
            position: relative;
        }

        .gutter {
            width: 45px;
            flex-shrink: 0; /* Don't let the gutter shrink */
            background-color: var(--gutter-bg);
            color: var(--gutter-text);
            text-align: right;
            padding: 20px 10px 20px 0;
            font-family: 'Consolas', monospace;
            font-size: 14px;
            line-height: 1.5;
            user-select: none;
            border-right: 1px solid var(--border-color);
        }

        textarea {
            flex: 1;
            background: transparent;
            color: #d4d4d4;
            border: none;
            padding: 20px;
            font-family: 'Consolas', monospace;
            font-size: 14px;
            line-height: 1.5;
            resize: none;
            outline: none;
            tab-size: 4;
            white-space: pre;
            min-width: 100%; /* Ensure it takes full width for horizontal scroll */
        }

        /* Preview Container */
        .preview-content {
            flex: 1;
            background: transparent;
        }

        pre[class*="language-"] {
            margin: 0 !important;
            padding: 20px !important;
            background: transparent !important;
        }

        code[class*="language-"] {
            font-size: 14px !important;
            line-height: 1.5 !important;
        }
    </style>
</head>
<body>

<header>
    <div><strong>CodeView Pro Fixed</strong></div>
    <button class="btn-download" onclick="downloadFile()">Download .txt</button>
</header>

<div class="main-container">
    <!-- LEFT: EDITOR -->
    <div class="pane pane-left">
        <div class="pane-title">Editor</div>
        <div class="scroll-wrapper" id="left-scroll">
            <div id="left-gutter" class="gutter">1</div>
            <textarea id="editor" spellcheck="false" wrap="off"></textarea>
        </div>
    </div>

    <!-- RIGHT: PREVIEW -->
    <div class="pane">
        <div class="pane-title">Highlighted View</div>
        <div class="scroll-wrapper" id="right-scroll">
            <div id="right-gutter" class="gutter">1</div>
            <div class="preview-content">
                <pre id="preview-pre" class="language-html"><code id="preview-code"></code></pre>
            </div>
        </div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-css.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-javascript.min.js"></script>

<script>
    const editor = document.getElementById('editor');
    const previewCode = document.getElementById('preview-code');
    const leftGutter = document.getElementById('left-gutter');
    const rightGutter = document.getElementById('right-gutter');
    const leftScroll = document.getElementById('left-scroll');
    const rightScroll = document.getElementById('right-scroll');

    function update() {
        const text = editor.value;
        
        // Update Line Numbers
        const lines = text.split('\n');
        const lineCount = lines.length;
        let gutterContent = '';
        for (let i = 1; i <= lineCount; i++) {
            gutterContent += i + '<br>';
        }
        leftGutter.innerHTML = gutterContent;
        rightGutter.innerHTML = gutterContent;

        // Update Highlighting
        previewCode.textContent = text;
        Prism.highlightElement(previewCode);
    }

    // Scroll Sync: Make one side follow the other
    leftScroll.addEventListener('scroll', () => {
        rightScroll.scrollTop = leftScroll.scrollTop;
    });

    rightScroll.addEventListener('scroll', () => {
        leftScroll.scrollTop = rightScroll.scrollTop;
    });

    function handleTab(e) {
        if (e.key === 'Tab') {
            e.preventDefault();
            const start = editor.selectionStart;
            const end = editor.selectionEnd;
            editor.value = editor.value.substring(0, start) + "    " + editor.value.substring(end);
            editor.selectionStart = editor.selectionEnd = start + 4;
            update();
        }
    }

    function downloadFile() {
        const text = editor.value;
        const blob = new Blob([text], { type: 'text/plain' });
        const anchor = document.createElement('a');
        anchor.download = 'code_export.txt';
        anchor.href = window.URL.createObjectURL(blob);
        anchor.click();
    }

    editor.addEventListener('input', update);
    editor.addEventListener('keydown', handleTab);

    // Default code
    editor.value = `<!-- Fixed Scroll Sync -->
<div class="test">
    <h1>Scroll me down!</h1>
</div>
` + Array(50).fill('// More lines...').join('\n');

    update();
</script>

</body>
</html>
